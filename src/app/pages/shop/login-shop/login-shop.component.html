<div class="login-container">
  <h2>Connexion</h2>

  <form (ngSubmit)="onLogin()">

    <input
      type="text"
      placeholder="Nom"
      [(ngModel)]="name"
      name="name"
      required
    />

    <input
      type="password"
      placeholder="Mot de passe"
      [(ngModel)]="password"
      name="password"
      required
    />

    <button type="submit">Se connecter</button>

    <p *ngIf="errorMessage" style="color:red">
      {{ errorMessage }}
    </p>

  </form>
</div>
