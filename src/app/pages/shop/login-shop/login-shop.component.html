<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-2xl">

    <!-- En-tête avec icône ou logo -->
    <div class="text-center">
      <div class="mx-auto h-16 w-16 bg-indigo-600 rounded-full flex items-center justify-center">
        <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
        Connexion à votre boutique
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        Accédez à votre espace client
      </p>
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="onLogin()" class="mt-8 space-y-6">

      <div class="space-y-4">
        <!-- Champ Nom -->
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
            Nom d'utilisateur
          </label>
          <input
            id="name"
            type="text"
            [(ngModel)]="name"
            name="name"
            required
            class="appearance-none relative block w-full px-4 py-3 border border-gray-300
                   placeholder-gray-400 text-gray-900 rounded-lg
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                   focus:z-10 sm:text-sm transition duration-150 ease-in-out"
            placeholder="Votre nom"
          />
        </div>

        <!-- Champ Mot de passe -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Mot de passe
          </label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            class="appearance-none relative block w-full px-4 py-3 border border-gray-300
                   placeholder-gray-400 text-gray-900 rounded-lg
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                   focus:z-10 sm:text-sm transition duration-150 ease-in-out"
            placeholder="••••••••"
          />
        </div>
      </div>

      <!-- Options supplémentaires (optionnel) -->
      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input
            id="remember-me"
            name="remember-me"
            type="checkbox"
            class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
          />
          <label for="remember-me" class="ml-2 block text-sm text-gray-900">
            Se souvenir de moi
          </label>
        </div>

        <div class="text-sm">
          <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500 transition duration-150">
            Mot de passe oublié ?
          </a>
        </div>
      </div>

      <!-- Bouton de connexion -->
      <div>
        <button
          type="submit"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent
                 text-sm font-medium rounded-lg text-white bg-indigo-600
                 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2
                 focus:ring-indigo-500 transform transition-all duration-150
                 hover:scale-[1.02] active:scale-[0.98] shadow-lg"
        >
          <span class="absolute left-0 inset-y-0 flex items-center pl-3">
            <svg class="h-5 w-5 text-indigo-300 group-hover:text-indigo-200"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
            </svg>
          </span>
          Se connecter
        </button>
      </div>

      <!-- Message d'erreur -->
      <div *ngIf="errorMessage" class="rounded-lg bg-red-50 p-4">
        <div class="flex">
          <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                    clip-rule="evenodd" />
            </svg>
          </div>
          <div class="ml-3">
            <p class="text-sm font-medium text-red-800">
              {{ errorMessage }}
            </p>
          </div>
        </div>
      </div>

      <!-- Lien d'inscription -->
      <div class="text-center text-sm text-gray-600">
        Pas encore de compte ?
        <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500 ml-1 transition duration-150">
          S'inscrire
        </a>
      </div>

    </form>
  </div>
</div>
