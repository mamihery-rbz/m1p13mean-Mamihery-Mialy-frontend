<div class="p-6">

  <h2 class="text-2xl font-bold mb-6">
    @if(edit){
      Modifier le produit
    }@else {
      Ajout d'un produit
    }
  </h2>

  @if (loading) {
    <div class="text-center py-6">
      Chargement...
    </div>
  }

  @if (errorMessage) {
    <div class="text-red-500 mb-4">
      {{ errorMessage }}
    </div>
  }

  @if (!loading && product) {
    <app-form-product
      [product]="product"
      [categories]="categories"
      [edit]="edit"
      (editSubmit)="update_product($event)"
      (addSubmit)="add_product($event)">
    </app-form-product>
  }

</div>
