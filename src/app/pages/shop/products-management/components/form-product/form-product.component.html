<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-xl mx-auto">

  <h3 class="text-lg font-semibold text-gray-800 mb-6">
    {{ edit ? 'Modifier le produit' : 'Nouveau produit' }}
  </h3>

  <!-- Nom -->
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">Nom du produit</label>
    <input
      type="text"
      [(ngModel)]="formData.name"
      class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      placeholder="Nom du produit"
    />
  </div>

  <!-- Prix -->
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">Prix (€)</label>
    <input
      type="number"
      [(ngModel)]="formData.price"
      step="0.01"
      class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      placeholder="0.00"
    />
  </div>

  <!-- Catégorie -->
  <div class="mb-6">
    <label class="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
    <select
      [(ngModel)]="formData.category_product"
      class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500"
    >
      <option value="" disabled>Sélectionner une catégorie</option>
      @for (cat of categories; track cat._id) {
        <option [value]="cat._id">{{ cat.name }}</option>
      }
    </select>
  </div>

    <!-- Bouton -->
    <button
      (click)="submit()"
      class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors"
    >
      {{ edit ? 'Modifier' : 'Ajouter' }} le produit
    </button>

</div>
