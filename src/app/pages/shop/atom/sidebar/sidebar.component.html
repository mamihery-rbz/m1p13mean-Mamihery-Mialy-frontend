<aside
  class="fixed left-0 top-0 z-40 h-screen pt-16 bg-white border-r border-gray-200 transition-all duration-300"
  [class.w-64]="!isCollapsed"
  [class.w-20]="isCollapsed"
  [class.-translate-x-full]="!isOpen && isMobile"
>
  <!-- Bouton collapse (desktop) -->
  <button
    (click)="toggleCollapse()"
    class="absolute -right-3 top-20 bg-white border border-gray-200 rounded-full p-1.5 hidden lg:block hover:bg-indigo-50 z-50 cursor-pointer"
    type="button"
  >
    <svg
      class="h-4 w-4 text-gray-600 transition-transform duration-300"
      [class.rotate-180]="isCollapsed"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <!-- Menu de navigation -->
  <nav class="h-full px-3 py-4 overflow-y-auto relative">
    <ul class="space-y-2">
      <!-- Dashboard -->
      <li (click)="to_dashboard()">
        <a
          href="/dashboard-shop"
          routerLinkActive="bg-indigo-50 text-indigo-600"
          [class.justify-center]="isCollapsed"
          class="flex items-center p-2 text-base font-medium text-gray-700 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 group transition duration-150 cursor-pointer relative z-40"
          [class.pointer-events-auto]="true"
        >
          <svg class="h-6 w-6 shrink-0" [class.mr-3]="!isCollapsed" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          <span *ngIf="!isCollapsed" class="whitespace-nowrap">Dashboard</span>
        </a>
      </li>

      <!-- Commandes -->
      <li>
        <a
          href="/order-management-shop"
          routerLinkActive="bg-indigo-50 text-indigo-600"
          [class.justify-center]="isCollapsed"
          class="flex items-center p-2 text-base font-medium text-gray-700 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 group transition duration-150 cursor-pointer relative z-40"
          [class.pointer-events-auto]="true"
        >
          <svg class="h-6 w-6 shrink-0" [class.mr-3]="!isCollapsed" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          <span *ngIf="!isCollapsed" class="whitespace-nowrap">Commandes</span>
          <span *ngIf="isCollapsed" class="absolute left-full ml-2 px-2 py-1 bg-gray-900 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50">Commandes</span>
        </a>
      </li>


      <!-- Produits -->
      <li>
        <a
          href="/products-management-shop"
          routerLinkActive="bg-indigo-50 text-indigo-600"
          [class.justify-center]="isCollapsed"
          class="flex items-center p-2 text-base font-medium text-gray-700 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 group transition duration-150 cursor-pointer relative z-40"
          [class.pointer-events-auto]="true"
        >
          <svg class="h-6 w-6 shrink-0" [class.mr-3]="!isCollapsed" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
          </svg>
          <span *ngIf="!isCollapsed" class="whitespace-nowrap">Produits</span>
        </a>
      </li>

      <li>
        <a
          href="/stock-products"
          routerLinkActive="bg-indigo-50 text-indigo-600"
          [class.justify-center]="isCollapsed"
          class="flex items-center p-2 text-base font-medium text-gray-700 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 group transition duration-150 cursor-pointer relative z-40"
          [class.pointer-events-auto]="true"
        >
          <svg class="h-6 w-6 shrink-0" [class.mr-3]="!isCollapsed" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
          </svg>
          <span *ngIf="!isCollapsed" class="whitespace-nowrap">Stock</span>
          <span *ngIf="isCollapsed" class="absolute left-full ml-2 px-2 py-1 bg-gray-900 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50">Stock</span>
        </a>
      </li>

      <li class="pt-4 mt-4 border-t border-gray-200">
        <a
          (click)="logout()"
          routerLinkActive="bg-indigo-50 text-indigo-600"
          [class.justify-center]="isCollapsed"
          class="flex items-center p-2 text-base font-medium text-gray-700 rounded-lg hover:bg-red-50 hover:text-red-600 group transition duration-150 cursor-pointer relative z-40"
          [class.pointer-events-auto]="true"
        >
          <svg class="h-6 w-6 shrink-0" [class.mr-3]="!isCollapsed" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span *ngIf="!isCollapsed" class="whitespace-nowrap">Déconnexion</span>
          <span *ngIf="isCollapsed" class="absolute left-full ml-2 px-2 py-1 bg-gray-900 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50">Déconnexion</span>
        </a>
      </li>
    </ul>
  </nav>
</aside>
