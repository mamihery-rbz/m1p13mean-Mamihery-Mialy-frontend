<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-xl mx-auto">

  <!-- En-tête -->
  <h3 class="text-lg font-semibold text-gray-800 mb-6">Nouveau mouvement de stock</h3>

  <!-- Type avec select amélioré -->
  <div class="mb-5">
    <label class="block text-sm font-medium text-gray-700 mb-2">Type de mouvement</label>
    <div class="relative">
      <select [(ngModel)]="formData.type"
              class="w-full appearance-none border border-gray-200 rounded-lg px-4 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white">
        <option value="IN" class="py-2">📥 Entrée</option>
        <option value="OUT" class="py-2">📤 Sortie</option>
      </select>
      <div class="absolute right-3 top-3 text-gray-400 pointer-events-none">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
  </div>

  <!-- Quantité -->
  <div class="mb-5">
    <label class="block text-sm font-medium text-gray-700 mb-2">Quantité</label>
    <input type="number"
           [(ngModel)]="formData.quantity"
           required
           min="1"
           class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
           placeholder="Saisissez la quantité">
  </div>

  <!-- Description -->
  <div class="mb-6">
    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
    <textarea [(ngModel)]="formData.description"
              rows="3"
              class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"
              placeholder="Description du mouvement (optionnel)"></textarea>
  </div>

  <!-- Bouton -->
  <button
    (click)="submit()"
    [disabled]="!formData.type || !formData.quantity"
    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-6 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
    Valider le mouvement
  </button>

</div>
