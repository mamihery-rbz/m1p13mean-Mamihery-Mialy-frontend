<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">

  <h3 class="text-sm font-semibold text-gray-700 mb-4">
    Filtrer les mouvements
  </h3>

  <div class="grid md:grid-cols-5 gap-4">

    <!-- Date min -->
    <div>
      <label class="text-xs text-gray-500">Date min</label>
      <input
        type="date"
        [(ngModel)]="filters.dateMin"
        (change)="emitFilter()"
        class="w-full mt-1 border rounded-lg px-3 py-2 text-sm"
      />
    </div>

    <!-- Date max -->
    <div>
      <label class="text-xs text-gray-500">Date max</label>
      <input
        type="date"
        [(ngModel)]="filters.dateMax"
        (change)="emitFilter()"
        class="w-full mt-1 border rounded-lg px-3 py-2 text-sm"
      />
    </div>

    <!-- Quantité min -->
    <div>
      <label class="text-xs text-gray-500">Quantité min</label>
      <input
        type="number"
        [(ngModel)]="filters.quantityMin"
        (input)="emitFilter()"
        class="w-full mt-1 border rounded-lg px-3 py-2 text-sm"
        placeholder="0"
      />
    </div>

    <!-- Type -->
    <div>
      <label class="text-xs text-gray-500">Type</label>
      <select
        [(ngModel)]="filters.type"
        (change)="emitFilter()"
        class="w-full mt-1 border rounded-lg px-3 py-2 text-sm"
      >
        <option value="">Tous</option>
        <option value="IN">Entrée</option>
        <option value="OUT">Sortie</option>
      </select>
    </div>

    <!-- Reset -->
    <div class="flex items-end">
      <button
        (click)="reset()"
        class="w-full bg-gray-100 hover:bg-gray-200 text-sm py-2 rounded-lg"
      >
        Réinitialiser
      </button>
    </div>

  </div>

</div>
