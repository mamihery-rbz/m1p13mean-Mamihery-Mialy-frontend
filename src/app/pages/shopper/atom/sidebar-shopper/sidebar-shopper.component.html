<aside class="bg-gray-50 border-r border-gray-200 min-h-screen w-64">
  <div class="p-6">
    <!-- En-tête avec profil rapide -->
    <div class="flex items-center space-x-3 mb-8 pb-4 border-b border-gray-200">
      <div class="h-10 w-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-semibold">
        {{ userInitials }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-900 truncate">{{ userName }}</p>
        <p class="text-xs text-gray-500">Client</p>
      </div>
    </div>

    <!-- Navigation principale -->
    <nav class="space-y-1">
      <!-- Accueil / Boutiques -->
      <a
        href="/shop-page"
        routerLinkActive="bg-indigo-600 text-white"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center px-4 py-3 rounded-lg transition duration-200 text-gray-700 hover:bg-indigo-50 group"

      >
        <svg class="h-5 w-5 mr-3"  fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="font-medium">Boutiques</span>
      </a>

      <!-- Mes commandes (NOUVEAU) -->
      <a href="/my-orders"

        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center px-4 py-3 rounded-lg transition duration-200 text-gray-700 hover:bg-indigo-50 group"

      >
        <svg class="h-5 w-5 mr-3"  fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        <span class="font-medium">Mes commandes</span>


      </a>


    </nav>

    <hr class="my-6">

    <!-- Section Catégories -->
    <h2 class="text-sm font-bold text-gray-900 mb-4 uppercase tracking-wide">Catégories</h2>
    <nav class="space-y-1">
      <button
        *ngFor="let category of categories"
        (click)="selectCategory(category.id)"
        [class.active]="activeCategory === category.id"
        class="w-full text-left px-4 py-2 rounded-lg transition duration-200 flex items-center space-x-3"
        [ngClass]="activeCategory === category.id ? 'bg-indigo-600 text-white' : 'text-gray-700 hover:bg-indigo-50'"
      >
        <span class="text-lg">{{ category.icon }}</span>
        <span class="text-sm font-medium">{{ category.name }}</span>

      </button>
    </nav>

    <hr class="my-6">

    <!-- Section Filtres -->
    <h3 class="text-sm font-bold text-gray-900 mb-4 uppercase tracking-wide">Filtres</h3>
    <div class="space-y-4">


      <!-- Filtre Évaluation -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Évaluation minimum</label>
        <div class="space-y-2">
          <label class="flex items-center cursor-pointer group">
            <input type="radio" name="rating" value="5" class="w-4 h-4 text-indigo-600" />
            <span class="ml-2 text-sm text-gray-600 group-hover:text-indigo-600">⭐⭐⭐⭐⭐ (5 étoiles)</span>
          </label>
          <label class="flex items-center cursor-pointer group">
            <input type="radio" name="rating" value="4" class="w-4 h-4 text-indigo-600" />
            <span class="ml-2 text-sm text-gray-600 group-hover:text-indigo-600">⭐⭐⭐⭐ et plus</span>
          </label>
          <label class="flex items-center cursor-pointer group">
            <input type="radio" name="rating" value="3" class="w-4 h-4 text-indigo-600" />
            <span class="ml-2 text-sm text-gray-600 group-hover:text-indigo-600">⭐⭐⭐ et plus</span>
          </label>
        </div>
      </div>

      
    </div>


  </div>
</aside>
