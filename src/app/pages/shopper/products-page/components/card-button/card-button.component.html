<!-- Bouton flottant -->
<div class="fixed bottom-6 right-6 z-50">
  <!-- Badge avec nombre d'articles -->
  @if (cartService.itemCount() > 0) {
    <div class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full h-6 w-6 flex items-center justify-center animate-pulse">
      {{ cartService.itemCount() }}
    </div>
  }

  <!-- Bouton panier -->
  <button
    (click)="toggleModal()"
    class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full p-4 shadow-2xl hover:shadow-xl transition-all duration-300 transform hover:scale-110 relative group"
  >
    <!-- Icône panier -->
    <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
    </svg>

    <!-- Tooltip au survol -->
    <span class="absolute right-full mr-3 top-1/2 -translate-y-1/2 bg-gray-900 text-white text-sm px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
      Voir mon panier
    </span>
  </button>
</div>

<!-- Modal du panier -->
@if (isModalOpen()) {
  <app-card-modal (closeModal)="closeModal()"></app-card-modal>
}
