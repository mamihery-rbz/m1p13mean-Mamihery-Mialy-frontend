<app-main-layout>
  <div class="space-y-6">
    <!-- En-tête -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Mes commandes</h1>
        <p class="text-gray-500 mt-1">Consultez l'historique de vos commandes</p>
      </div>

      <!-- Statistique -->
      @if (!loading && orders.length > 0) {
        <div class="bg-indigo-50 px-4 py-2 rounded-lg">
          <span class="text-sm font-medium text-indigo-700">
            {{ orders.length }} commande(s)
          </span>
        </div>
      }
    </div>

    <!-- Liste des commandes -->
    <app-list-orders-user
      [orders]="orders"
      [loading]="loading"
      [error]="error"
      (viewDetails)="loadOrderDetails($event)"
      (deleteOrder)="deleteOrder($event)">
    </app-list-orders-user>
  </div>
</app-main-layout>

<!-- Modal des détails -->
@if (showDetails) {
  <app-order-details
    [order]="selectedOrder"
    [details]="orderDetails"
    [loading]="loadingDetails"
    (close)="closeDetails()"
    (detailsUpdated)="refreshAfterUpdate()" >
  </app-order-details>
}
