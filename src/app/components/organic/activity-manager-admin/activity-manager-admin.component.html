<div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-semibold text-gray-800">Activity manager</h3>
            <div class="flex items-center gap-2">
              <button class="text-gray-400 hover:text-gray-600">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              </button>
              <button class="text-gray-400 hover:text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16"/></svg>
              </button>
              <button class="text-gray-400 hover:text-gray-600 flex items-center gap-1 text-xs">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/></svg>
                Filters
              </button>
            </div>
          </div>

          <!-- Search + Tags -->
          <div class="flex items-center gap-2 mb-3">
            <div class="flex items-center gap-1 flex-1 border border-gray-200 rounded-full px-3 py-1.5">
              <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
              <input type="text" placeholder="Search in activities..." class="text-xs text-gray-400 bg-transparent outline-none flex-1"/>
            </div>
          </div>
          <div class="flex gap-1 mb-3 flex-wrap">
            <span *ngFor="let tag of activityTags" [ngClass]="tag.active ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-600'" class="text-xs px-2 py-1 rounded-full flex items-center gap-1 cursor-pointer hover:opacity-80 transition-opacity">
              {{ tag.label }}
              <button (click)="removeTag(tag)" class="ml-0.5 hover:text-red-400">×</button>
            </span>
          </div>

          <!-- Activity Row with Bars -->
          <div class="bg-gray-50 rounded-xl p-3 mb-3">
            <div class="flex items-center justify-between mb-2">
              <p class="text-sm font-bold text-gray-900">$&nbsp;{{ activityAmount | number:'1.2-2' }} <span class="text-xs text-gray-400 font-normal">USD</span></p>
            </div>
            <!-- Candlestick-style mini bars -->
            <div class="flex items-end gap-0.5 h-10">
              <div *ngFor="let b of activityBars; let i = index"
                [style.height.px]="b.height"
                [ngClass]="b.active ? 'bg-coral' : 'bg-gray-200'"
                class="flex-1 rounded-t-sm transition-all duration-300 cursor-pointer hover:opacity-80"
                (click)="selectActivityBar(i)">
              </div>
            </div>
            <div class="flex justify-center gap-1 mt-2">
              <span *ngFor="let d of activityDots; let i = index" [ngClass]="i === activeActivityDot ? 'bg-coral w-3' : 'bg-gray-300 w-1.5'" class="h-1.5 rounded-full transition-all duration-300 cursor-pointer" (click)="activeActivityDot = i"></span>
            </div>
          </div>

          <!-- Business Plans -->
          <div class="border border-gray-100 rounded-xl p-3">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs font-semibold text-gray-800">Business plans</span>
              <button class="text-gray-400"><svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
            </div>
            <div class="space-y-1.5">
              <div *ngFor="let plan of businessPlans" class="flex items-center gap-2">
                <div [ngClass]="plan.iconBg" class="w-4 h-4 rounded-full flex items-center justify-center flex-shrink-0">
                  <svg class="w-2 h-2 text-white" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/></svg>
                </div>
                <span class="text-xs text-gray-600 flex-1">{{ plan.name }}</span>
                <div *ngIf="plan.hasDropdown" class="relative">
                  <select class="text-xs text-gray-500 bg-transparent appearance-none cursor-pointer focus:outline-none pr-3">
                    <option>{{ plan.option }}</option>
                  </select>
                  <svg class="w-2.5 h-2.5 text-gray-400 absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>
              </div>
            </div>
          </div>
        </div>
