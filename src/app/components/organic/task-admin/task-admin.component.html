<div class="flex items-center gap-4">
    <div class="flex flex-col items-center min-w-[52px]">
    <span class="text-4xl font-bold text-gray-900 leading-none">{{ today.day }}</span>
    <span class="text-xs text-gray-400 mt-0.5">{{ today.weekday }}, {{ today.month }}</span>
    </div>
    <button (click)="showTasks()" class="flex items-center gap-2 bg-coral text-white text-sm font-medium px-5 py-2.5 rounded-full hover:bg-coral-dark transition-all duration-200 shadow-sm hover:shadow-md hover:-translate-y-0.5">
    Show my Tasks
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
    </svg>
    </button>
    <button class="relative w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 transition-colors">
    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
    </svg>
    <span class="absolute top-1 right-1 w-1.5 h-1.5 bg-coral rounded-full"></span>
    </button>
</div>
