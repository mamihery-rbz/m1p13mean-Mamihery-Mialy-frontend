<div class="space-y-3">
            <!-- 13 Days Card -->
            <div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow">
                <div class="flex justify-between items-start">
                <div>
                    <div class="flex items-center gap-1 mb-1">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <p class="text-2xl font-bold text-gray-900">{{ streakDays }} Days</p>
                    <p class="text-xs text-gray-400">{{ streakHours }} hours, {{ streakMinutes }} minutes</p>
                    <!-- Dots heat map -->
                    <div class="flex gap-0.5 mt-2 flex-wrap max-w-[120px]">
                    <span *ngFor="let d of heatDots" [ngClass]="d ? 'bg-coral' : 'bg-gray-200'" class="w-2 h-2 rounded-full inline-block"></span>
                    </div>
                </div>
                <!-- Mini bar chart -->
                <div class="flex items-end gap-0.5 h-24">
                    <div class="flex flex-col items-end">
                    <span class="text-xs font-semibold text-gray-700 mb-1">2023</span>
                    <div class="flex items-end gap-0.5 h-10">
                        <div *ngFor="let b of miniBarData" [style.height.px]="b" class="w-1.5 bg-coral rounded-t-sm transition-all duration-500"></div>
                    </div>
                    <span class="text-xs text-gray-400 mt-1">2022</span>
                    </div>
                </div>
                </div>
            </div>

            <!-- Main Stocks Card -->
            <div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow">
                <div class="flex justify-between items-start">
                <div>
                    <svg class="w-4 h-4 text-gray-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    <p class="text-lg font-bold text-gray-900">${{ stats.mainStocksValue | number:'1.2-2' }}</p>
                    <p class="text-sm font-semibold text-gray-700 mt-1">Main Stocks</p>
                    <p class="text-xs text-gray-400">Extended &amp; Limited</p>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <span class="text-xs font-bold text-green-500 bg-green-50 px-2 py-0.5 rounded-full">+{{ stats.stocksGrowth }}%</span>
                    <!-- Mini sparkline -->
                    <svg viewBox="0 0 80 30" class="w-20 h-8">
                    <polyline [attr.points]="sparklinePoints" fill="none" stroke="#e85d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                </div>
            </div>
            </div>
