<div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow relative">
    <div class="flex items-center justify-between mb-3">
            <span class="font-bold text-sm tracking-widest text-gray-800">VISA</span>
            <div class="relative">
              <select class="text-xs text-gray-500 bg-gray-50 border border-gray-200 rounded-full px-2 py-1 pr-5 appearance-none cursor-pointer focus:outline-none">
                <option>Direct Debits</option>
                <option>Credit</option>
              </select>
              <svg class="w-3 h-3 text-gray-400 absolute right-1.5 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
    </div>
    <p class="text-xs text-gray-400 mb-1">Linked to main account</p>
    <p class="text-lg font-semibold text-gray-800 mb-3">•••• {{ card.last4 }}</p>
    <div class="flex gap-2 mb-4">
            <button (click)="receivePayment()" class="flex-1 bg-gray-900 text-white text-xs font-medium py-2 rounded-full hover:bg-gray-700 transition-colors">Receive</button>
            <button (click)="sendPayment()" class="flex-1 border border-gray-200 text-gray-600 text-xs font-medium py-2 rounded-full hover:bg-gray-50 transition-colors">Send</button>
    </div>
    <div class="absolute left-3 top-1/2 -translate-y-1/2 flex flex-col gap-2 opacity-40">
            <button class="w-5 h-5 rounded-full border border-gray-300 flex items-center justify-center text-gray-500">+</button>
            <button class="w-5 h-5 rounded-full border border-gray-300 flex items-center justify-center text-gray-500">
              <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            </button>
    </div>
    <div class="border-t border-gray-100 pt-3 flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-400">Monthly regular fee</p>
              <p class="text-sm font-semibold text-gray-800">$&nbsp;{{ card.monthlyFee | number:'1.2-2' }}</p>
            </div>
            <button class="text-xs text-coral flex items-center gap-1 hover:underline">
              <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
              Edit cards limitation
            </button>
    </div>
</div>
