<div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow flex flex-col items-center justify-center">
    <div class="relative w-28 h-58">
        
                <div class="absolute top-5 left-1/2 -translate-x-1/2 flex flex-col items-center">
                <div class="w-7 h-7 bg-gray-900 rounded-full flex items-center justify-center mb-0.5">
                    <svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <span class="text-xs font-medium text-gray-700">System Lock</span>
                </div>


                <svg viewBox="0 0 36 36" class="w-28 h-54 mt-15 -rotate-90" >
                <circle cx="18" cy="18" r="15.9155" fill="none" stroke="#f1f1f1" stroke-width="3"/>
                <circle
                    cx="18" cy="18" r="15.9155"
                    fill="none"
                    stroke="#e85d3a"
                    stroke-width="3"
                    [attr.stroke-dasharray]="stats.growthRate + ', 100'"
                    stroke-linecap="round"
                    class="transition-all duration-700"
                />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center mt-25">
                <span class="text-xl font-bold text-gray-900">{{ stats.growthRate }}%</span>
                <span class="text-xs text-gray-400">Growth rate</span>
                </div>
    </div>
</div>
