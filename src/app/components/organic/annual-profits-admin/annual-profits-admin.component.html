<div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-semibold text-gray-800">Annual profits</h3>
            <div class="relative">
              <select [(ngModel)]="selectedYear" (change)="onYearChange()" class="text-xs text-gray-500 bg-gray-50 border border-gray-200 rounded-full px-2 py-1 pr-5 appearance-none cursor-pointer focus:outline-none">
                <option *ngFor="let y of years" [value]="y">{{ y }}</option>
              </select>
              <svg class="w-3 h-3 text-gray-400 absolute right-1.5 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>
          <!-- Concentric circles chart -->
          <div class="relative flex items-end justify-center h-40">
            <div *ngFor="let ring of profitRings; let i = index"
              [ngStyle]="{'width': ring.size+'px', 'height': ring.size+'px', 'backgroundColor': ring.color}"
              class="absolute rounded-full flex items-center justify-center">
              <span *ngIf="i === profitRings.length - 1 || true" class="absolute" [ngStyle]="{'top': ring.labelTop, 'left': '50%', 'transform': 'translateX(-50%)'}">
                <span class="text-xs font-regular text-white bg-transparent">$ </span><span class="text-xs font-regular text-black bg-transparent">{{ ring.label }}</span>
              </span>
            </div>
          </div>
          <div class="flex justify-around mt-2">
            <div *ngFor="let ring of profitRings" class="flex items-center gap-1">
              <span [ngStyle]="{'backgroundColor': ring.color}" class="w-2 h-2 rounded-full inline-block"></span>
              <span class="text-xs text-gray-500">${{ ring.label }}</span>
            </div>
          </div>
        </div>
