<header class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <div class="flex items-center gap-3">
        <button class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 bg-gray-900 rounded-full flex items-center justify-center">
            <span class="text-white text-xs font-bold">№</span>
          </div>
          <div>
            <p class="text-sm font-semibold text-gray-900 leading-tight">Financial</p>
            <p class="text-xs text-gray-400 leading-tight">Dashboard</p>
          </div>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 transition-colors text-gray-500 font-light text-lg">+</button>
        <div class="flex items-center gap-2">
          <img [src]="user.avatar" [alt]="user.name" class="w-9 h-9 rounded-full object-cover ring-2 ring-gray-100"/>
          <div class="hidden sm:block">
            <p class="text-sm font-semibold text-gray-900 leading-tight">{{ user.name }}</p>
            <p class="text-xs text-gray-400 leading-tight">{{ user.role }}</p>
          </div>
        </div>
        <div class="flex items-center gap-2 border border-gray-200 rounded-full px-3 py-1.5">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
          <input type="text" placeholder="Start searching here ..." class="text-xs text-gray-400 bg-transparent outline-none w-36"/>
        </div>
      </div>
    </header>
